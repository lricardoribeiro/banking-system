# Configurações do perfil de teste – sobrepõe application.yml para testes de integração
spring:
  jpa:
    hibernate:
      ddl-auto: validate  # Liquibase cria o schema; validate confirma que está correto
    show-sql: true        # Exibe SQL nos testes para facilitar debugging

  kafka:
    consumer:
      auto-offset-reset: earliest

  liquibase:
    enabled: true

# Desabilita segurança nos testes de integração para simplicidade
# (os testes de segurança devem ser executados separadamente com MockMvc)
banking:
  security:
    jwt:
      secret: dGVzdC1zZWNyZXQta2V5LXBhcmEtdGVzdGVzLXVuaXRhcmlvcw==
      expiration-ms: 3600000
      issuer: banking-system-test

logging:
  level:
    com.banking.system: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG  # Mostra SQL gerado nos testes

server:
  port: 8080
  shutdown: graceful  # encerra graciosamente as requisições em andamento no SIGTERM

spring:
  application:
    name: banking-system

  datasource:
    url: jdbc:postgresql://localhost:5432/banking
    username: banking_user
    password: ${DB_PASSWORD:banking_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Query de validação de conexão do pool
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate          # Liquibase gerencia o schema – nunca usar create/update em produção
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        # Habilitar estatísticas para monitoramento (desabilitado em produção por performance)
        generate_statistics: false
        jdbc:
          batch_size: 50          # inserções em lote para lançamentos do ledger
          fetch_size: 100
        order_inserts: true
        order_updates: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      client-id: banking-producer
    consumer:
      group-id: banking-transfer-consumer
      auto-offset-reset: earliest   # consumir desde o início na primeira execução

  lifecycle:
    timeout-per-shutdown-phase: 30s  # aguardar até 30s para finalizar transações em curso

# Configurações de negócio do sistema bancário
banking:
  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-in-base64-encoded-format-here==}
      expiration-ms: 3600000   # 1 hora – reduzir em produção para maior segurança
      issuer: banking-system

# Endpoints do Actuator (monitoramento e saúde)
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, loggers
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true    # /actuator/health/liveness + /actuator/health/readiness (para Kubernetes)
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}
  tracing:
    sampling:
      probability: 1.0    # 100% em dev; definir 0.1 em produção para reduzir overhead

# Log estruturado em JSON para integração com stacks de observabilidade (ELK, Grafana Loki etc.)
logging:
  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}","level":"%level","servico":"banking-system",
      "traceId":"%X{traceId:-}","correlationId":"%X{correlationId:-}","thread":"%thread",
      "logger":"%logger{36}","mensagem":"%msg"}%n
  level:
    root: INFO
    com.banking.system: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
